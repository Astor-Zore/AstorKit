#!/usr/bin/env fish

# Get absolute path of the directory containing this config file
set base_dir (dirname (status -f))

# Rebuild PATH by removing any entries under base_dir (any depth)
set -l new_path
set -l path_parts (string split : $PATH)

# Escape base_dir for use in a regular expression
set escaped_base_dir (string escape --style=regex -- $base_dir)

for part in $path_parts
    # Skip if part starts with base_dir/ (any subdirectory)
    if string match -rq -- "^$escaped_base_dir/" $part
        continue
    end
    set new_path $new_path $part
end


# Collect all immediate first‑level and second‑level subdirectories
set -l subdirs
for dir in $base_dir/*/
    if test -d $dir

        set dir_clean (string trim -r -c '/' $dir)
        set subdirs $subdirs $dir_clean

        # Add second‑level directories
        for sub in $dir_clean/*/
            if test -d $sub
                set sub_clean (string trim -r -c '/' $sub)
                set subdirs $subdirs $sub_clean
            end
        end
    end
end

# Sort subdirectories alphabetically
if count $subdirs > /dev/null
    set subdirs (printf "%s\n" $subdirs | sort)
end

# Prepend subdirectories in reverse order (first sorted directory ends up at the front of PATH)
set -l cnt (count $subdirs)
if test $cnt -gt 0

    for i in (seq $cnt -1 1)
        set new_path $subdirs[$i] $new_path
    end
end


# Export the final PATH

set -gx PATH $new_path
