#!/usr/bin/env fish

# Get absolute path of the directory containing this config file
set base_dir (dirname (status -f))

# Rebuild PATH by removing any entries under base_dir
set -l new_path
set -l path_parts (string split : $PATH)

for part in $path_parts
    if string match -q -- "$base_dir/*" $part
        continue
    end
    set new_path $new_path $part
end

# Collect all immediate subdirectories under base_dir (strip trailing slash)
set -l subdirs
for dir in $base_dir/*/
    if test -d $dir
        set dir (string trim -r -c '/' $dir)
        set subdirs $subdirs $dir
    end
end

# Sort subdirectories alphabetically using external sort command
if count $subdirs > /dev/null
    set subdirs (printf "%s\n" $subdirs | sort)
end

# Prepend subdirectories in reverse order so that the first in sorted order
# ends up at the very front of PATH
set -l cnt (count $subdirs)
if test $cnt -gt 0
    for i in (seq $cnt -1 1)
        set new_path $subdirs[$i] $new_path
    end
end

# Export the final PATH
set -gx PATH $new_path
