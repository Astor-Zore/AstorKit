# Environment configuration: automatically sync all subdirectories of this script's location to PATH.
# When sourced, it removes any previously added subdirectories (under this base) from PATH,
# then prepends all currently existing subdirectories.
# This ensures deletions and new directories are reflected immediately.

# Get the absolute path of the directory containing this configuration file
local base_dir="${0:A:h}"

# Function to rebuild PATH without the managed directories
local -a new_path
local -a path_parts
# Split current PATH into an array using : as delimiter
path_parts=("${(@s/:/)PATH}")

# Build new PATH by filtering out entries that belong to the base_dir (and are subdirectories)
for part in "${path_parts[@]}"; do
    # Skip if the entry is a direct subdirectory of base_dir (i.e., base_dir/any_subdir)
    if [[ "$part" == "$base_dir"/* ]]; then
        continue
    fi
    # Keep other entries
    new_path+=("$part")
done

# Now prepend all existing subdirectories under base_dir (only immediate children)
local -a subdirs
# Collect immediate subdirectories, sort them alphabetically for consistency
for dir in "$base_dir"/*/; do
    # Only add if the directory actually exists (the glob expands)
    if [[ -d "$dir" ]]; then
        # Remove trailing slash to keep PATH entries clean
        subdirs+=("${dir%/}")
    fi
done

# Sort subdirectories alphabetically (optional, can be removed if order doesn't matter)
subdirs=("${(@o)subdirs}")

# Prepend each subdirectory (in reverse order so that the first in list ends up at the front)
# We want the first subdirectory to be at the very front of PATH, so prepend in reverse.
for (( i = ${#subdirs[@]} ; i >= 1 ; i-- )); do
    new_path=("${subdirs[$i]}" "${new_path[@]}")
done

# Export the final PATH
export PATH="${(j/:/)new_path}"
