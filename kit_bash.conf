# Environment configuration: automatically sync all subdirectories (up to two levels)
# of this script's location to PATH.
# When sourced, it removes any previously added subdirectories (under this base) from PATH,
# then prepends all currently existing subdirectories.
# This ensures deletions and new directories are reflected immediately.

# Get the absolute path of the directory containing this configuration file
local base_dir="${0:A:h}"

# Function to rebuild PATH without the managed directories
local -a new_path
local -a path_parts

# Split current PATH into an array using : as delimiter
path_parts=("${(@s/:/)PATH}")

# Build new PATH by filtering out entries that start with base_dir/
for part in "${path_parts[@]}"; do
    # Skip if the entry is under base_dir (any subdirectory, any depth)
    if [[ "$part" == "$base_dir"/* ]]; then
        continue
    fi
    # Keep other entries
    new_path+=("$part")
done

# Now collect all existing first‑level and second‑level subdirectories under base_dir
local -a subdirs
# Use glob qualifiers: (/) ensures directories, (N) avoids error if none exist
for dir in "$base_dir"/*(/N); do

    subdirs+=("$dir")
    # Add second‑level directories
    for sub in "$dir"/*(/N); do
        subdirs+=("$sub")

    done
done

# Sort subdirectories alphabetically for consistency
subdirs=("${(@o)subdirs}")


# Prepend each subdirectory in reverse order so that the first in the list ends up first in PATH
for (( i = ${#subdirs[@]} ; i >= 1 ; i-- )); do
    new_path=("${subdirs[$i]}" "${new_path[@]}")
done

# Export the final PATH
export PATH="${(j/:/)new_path}"
